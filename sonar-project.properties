sonar.organization=ricardordev
sonar.projectKey=ricardordev_nest-api

sonar.sources=src
sonar.tests=src,test
sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts
sonar.exclusions=**/*.spec.ts,**/*.e2e-spec.ts,**/node_modules/**,**/dist/**,**/src/generated/**

sonar.coverage.exclusions=\
  **/src/main.ts,\
  **/*.module.ts,\
  **/dto/**,\
  **/*.entity.ts,\
  **/*.enum.ts,\
  **/*.types.ts,\
  **/*.interface.ts,\
  **/src/generated/**,\
  **/src/common/**,\
  **/src/infra/**,\
  **/auth/auth.controller.ts,\
  **/auth/guards/**,\
  **/auth/strategies/**,\
  **/health/health.controller.ts,\
  **/single-data/single-data.controller.ts,\
  **/use-cases/delete-transaction.use-case.ts,\
  **/use-cases/find-transaction.use-case.ts,\
  **/use-cases/list-transaction.use-case.ts

sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8