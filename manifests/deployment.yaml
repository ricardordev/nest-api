apiVersion: apps/v1
kind: Deployment
metadata:
  name: nest-api
  namespace: default
  labels:
    app: nest-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: nest-api
  template:
    metadata:
      labels:
        app: nest-api
    spec:
      imagePullSecrets:
        - name: ecr-registry-secret
      containers:
        - name: nest-api
          image: ECR_REPOSITORY_PLACEHOLDER:IMAGE_TAG
          ports:
            - containerPort: PORT_PLACEHOLDER
          envFrom:
            - secretRef:
                name: nest-api-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /health
              port: PORT_PLACEHOLDER
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: PORT_PLACEHOLDER
            initialDelaySeconds: 15
            periodSeconds: 10